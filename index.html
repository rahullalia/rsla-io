<html lang="en">

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="preload" href="/fonts/Satoshi-Bold.otf" as="font" type="font/otf" crossorigin>

<body>
  <!-- Global Noise Filter SVG -->
  <svg viewBox="0 0 100vw 100vh" xmlns="http://www.w3.org/2000/svg" class="noise-overlay" preserveAspectRatio="none">

      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch" />
    </filter>
    <rect width="100%" height="100%" filter="url(#noiseFilter)" />
  </svg>

  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
